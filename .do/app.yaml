name: nfl-sentiment-analyzer
region: sfo
services:
  - name: backend
    github:
      branch: main
      repo_clone_url: https://github.com/cdobratz/nfl-sentiment-analyzer.git
    dockerfile_path: backend/Dockerfile
    source_dir: backend
    http_port: 3000
    instance_size_slug: basic-xxs
    instance_count: 1
    routes:
      - path: /api/*
    envs:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        value: "${MONGODB_URI}"
      - key: ML_API_URL
        value: ${ml-service.PRIVATE_URL}
    build_command: docker build -t backend -f backend/Dockerfile .
    run_command: docker run -p 3000:3000 backend

  - name: ml-service
    github:
      branch: main
      repo_clone_url: https://github.com/cdobratz/nfl-sentiment-analyzer.git
    dockerfile_path: ml/Dockerfile
    source_dir: ml
    http_port: 8000
    instance_size_slug: basic-xs
    instance_count: 1
    routes:
      - path: /ml/*
    envs:
      - key: MONGODB_URI
        value: "${MONGODB_URI}"
    build_command: docker build -t ml-service -f ml/Dockerfile .
    run_command: docker run -p 8000:8000 ml-service
