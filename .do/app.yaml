name: nfl-sentiment-analyzer
region: sfo
services:
  - name: backend
    github:
      branch: main
      deploy_on_push: true
      repo: cdobratz/nfl-sentiment-analyzer
    source_dir: backend
    buildpacks:
      - name: node
    build_command: npm install && npm run build
    run_command: npm start
    http_port: 3000
    instance_size_slug: basic-xxs
    instance_count: 1
    routes:
      - path: /api/*
    envs:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        value: "${MONGODB_URI}"
      - key: ML_API_URL
        value: ${ml-service.PRIVATE_URL}

  - name: ml-service
    github:
      branch: main
      deploy_on_push: true
      repo: cdobratz/nfl-sentiment-analyzer
    source_dir: ml
    buildpacks:
      - name: python
    build_command: pip install -r requirements.txt
    run_command: python -m uvicorn api.main:app --host 0.0.0.0 --port 8000
    http_port: 8000
    instance_size_slug: basic-xs
    instance_count: 1
    routes:
      - path: /ml/*
    envs:
      - key: MONGODB_URI
        value: "${MONGODB_URI}"
      - key: PYTHON_VERSION
        value: "3.12"
