name: nfl-sentiment-analyzer
region: sfo
services:
  - name: backend
    github:
      branch: main
      repo: cdobratz/nfl-sentiment-analyzer
    dockerfile_path: backend/Dockerfile
    source_dir: backend
    http_port: 3000
    instance_size_slug: basic-xxs
    instance_count: 1
    routes:
      - path: /api
    envs:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        value: "${MONGODB_URI}"
      - key: ML_API_URL
        value: ${ml-service.PRIVATE_URL}
      - key: TWITTER_BEARER_TOKEN
        value: "${TWITTER_BEARER_TOKEN}"
      - key: TWITTER_API_KEY
        value: "${TWITTER_API_KEY}"
      - key: TWITTER_API_SECRET
        value: "${TWITTER_API_SECRET}"
      - key: TWITTER_DAILY_TWEET_LIMIT
        value: "50"
      - key: TWITTER_RATE_LIMIT_WINDOW
        value: "900000"
  - name: ml-service
    github:
      branch: main
      repo: cdobratz/nfl-sentiment-analyzer
    dockerfile_path: ml/Dockerfile
    source_dir: ml
    http_port: 8000
    instance_size_slug: basic-xs
    instance_count: 1
    routes:
      - path: /ml
    envs:
      - key: MONGODB_URI
        value: "${MONGODB_URI}"
