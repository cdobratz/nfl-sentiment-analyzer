name: nfl-sentiment-analyzer
region: sfo
services:
  - name: backend
    github:
      branch: main
      repo_clone_url: https://github.com/cdobratz/nfl-sentiment-analyzer.git
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    http_port: 3000
    instance_size_slug: basic-xxs
    instance_count: 1
    routes:
      - path: /api/*
    envs:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        value: "${MONGODB_URI}"
      - key: ML_API_URL
        value: ${ml-service.PRIVATE_URL}
      - key: PORT
        value: "3000"

  - name: ml-service
    github:
      branch: main
      repo_clone_url: https://github.com/cdobratz/nfl-sentiment-analyzer.git
    source_dir: ml
    dockerfile_path: ml/Dockerfile
    http_port: 8000
    instance_size_slug: basic-xs
    instance_count: 1
    routes:
      - path: /ml/*
    envs:
      - key: MONGODB_URI
        value: "${MONGODB_URI}"
      - key: PORT
        value: "8000"
