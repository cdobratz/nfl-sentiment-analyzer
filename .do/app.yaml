name: nfl-sentiment-analyzer
region: sfo
services:
  - name: backend
    github:
      branch: main
      deploy_on_push: true
      repo: cdobratz/nfl-sentiment-analyzer
    source_dir: backend
    envs:
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: MONGODB_URI
        value: "${MONGODB_URI}"
      - key: ML_API_URL
        value: ${ml-service.PRIVATE_URL}
      - key: PORT
        value: "3000"
    http_port: 3000
    instance_size_slug: basic-xxs
    instance_count: 1
    routes:
      - path: /api/*

  - name: ml-service
    github:
      branch: main
      deploy_on_push: true
      repo: cdobratz/nfl-sentiment-analyzer
    source_dir: ml
    build_command: pip install -r requirements.txt
    run_command: python -m uvicorn api.main:app --host 0.0.0.0 --port 8000
    http_port: 8000
    instance_size_slug: basic-xs
    instance_count: 1
    routes:
      - path: /ml/*
    envs:
      - key: MONGODB_URI
        value: "${MONGODB_URI}"
      - key: PORT
        value: "8000"
