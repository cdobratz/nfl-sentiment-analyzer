name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  APP_NAME: nfl-sentiment-analyzer

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Deploy to App Platform
        run: |
          doctl apps update ${{ secrets.DO_APP_ID }} \
            --spec .do/app.yaml \
            --wait

      - name: Run health checks
        run: |
          # Wait for deployment to stabilize
          sleep 30
          
          # Check Backend service health
          curl --fail --retry 3 --retry-delay 5 https://${{ env.APP_NAME }}-jxf4g.ondigitalocean.app/api/health || exit 1
          
          # Check ML service health
          curl --fail --retry 3 --retry-delay 5 https://${{ env.APP_NAME }}-jxf4g.ondigitalocean.app/ml/health || exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed! Please check the logs for more information."
          exit 1
