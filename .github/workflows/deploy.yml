name: Deploy to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY_BACKEND: nfl-analyzer-backend
  ECR_REPOSITORY_ML: nfl-analyzer-ml
  ECS_SERVICE_BACKEND: nfl-backend-service
  ECS_SERVICE_ML: nfl-ml-service
  ECS_CLUSTER: nfl-analyzer-cluster
  CONTAINER_NAME_BACKEND: nfl-backend
  CONTAINER_NAME_ML: nfl-ml

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push Backend image to Amazon ECR
      id: build-backend
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      working-directory: ./backend
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG
        echo "::set-output name=image::$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG"

    - name: Build, tag, and push ML Service image to Amazon ECR
      id: build-ml
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      working-directory: ./ml
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_ML:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY_ML:$IMAGE_TAG
        echo "::set-output name=image::$ECR_REGISTRY/$ECR_REPOSITORY_ML:$IMAGE_TAG"

    - name: Download task definition
      run: |
        aws ecs describe-task-definition --task-definition nfl-backend-task --query taskDefinition > backend-task-def.json
        aws ecs describe-task-definition --task-definition nfl-ml-task --query taskDefinition > ml-task-def.json

    - name: Fill in the new backend image ID in the Amazon ECS task definition
      id: task-def-backend
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: backend-task-def.json
        container-name: ${{ env.CONTAINER_NAME_BACKEND }}
        image: ${{ steps.build-backend.outputs.image }}

    - name: Fill in the new ML image ID in the Amazon ECS task definition
      id: task-def-ml
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ml-task-def.json
        container-name: ${{ env.CONTAINER_NAME_ML }}
        image: ${{ steps.build-ml.outputs.image }}

    - name: Deploy Amazon ECS task definitions
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def-backend.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE_BACKEND }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    - name: Deploy ML Service to Amazon ECS
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def-ml.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE_ML }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
