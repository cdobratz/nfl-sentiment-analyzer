name: Deploy to DigitalOcean

on:
  workflow_run:
    workflows: ['ML Pipeline', 'Backend Pipeline']
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  REGISTRY: "registry.digitalocean.com/nfl-analyzer"
  ML_IMAGE: "nfl-ml-service"
  BACKEND_IMAGE: "nfl-backend"
  APP_URL: "nfl-sentiment-analyzer-jxf4g.ondigitalocean.app"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Update App Platform deployment
        run: |
          doctl apps update ${{ secrets.DO_APP_ID }} \
            --spec .do/app.yaml \
            --wait

      - name: Wait for deployment
        run: sleep 30

      - name: Run health checks
        run: |
          # Check ML service health
          curl --fail --retry 3 --retry-delay 5 https://${APP_URL}/ml/health || exit 1
          # Check Backend service health
          curl --fail --retry 3 --retry-delay 5 https://${APP_URL}/api/health || exit 1

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Deployment Failed',
              body: 'Deployment to DigitalOcean failed. Please check the logs.'
            })
