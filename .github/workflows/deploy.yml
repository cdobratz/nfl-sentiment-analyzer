name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  APP_NAME: nfl-analysis
  REGISTRY: registry.digitalocean.com
  REGISTRY_IMAGE: ${{ secrets.REGISTRY_NAME }}

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DO Container Registry
        run: doctl registry login --expiry-seconds 600

      - name: Build container image
        run: docker build -t $(echo $REGISTRY)/$(echo $REGISTRY_IMAGE)/$(echo $APP_NAME):$(echo $GITHUB_SHA) .

      - name: Push image to DO Container Registry
        run: docker push $(echo $REGISTRY)/$(echo $REGISTRY_IMAGE)/$(echo $APP_NAME):$(echo $GITHUB_SHA)

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Deploy to Digital Ocean App Platform
        uses: digitalocean/app_action@v1.1.5
        with:
          app_name: ${{ env.APP_NAME }}
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          images: |
            [
              {
                "name": "${{ env.APP_NAME }}",
                "image": {
                  "registry_type": "DOCR",
                  "repository": "${{ env.REGISTRY_IMAGE }}/${{ env.APP_NAME }}",
                  "tag": "${{ github.sha }}"
                }
              }
            ]

      - name: Wait for deployment
        run: sleep 30

      - name: Run health checks
        run: |
          # Check ML service health
          curl --fail --retry 3 --retry-delay 5 https://nfl-sentiment-analyzer-jxf4g.ondigitalocean.app/ml/health || exit 1
          # Check Backend service health
          curl --fail --retry 3 --retry-delay 5 https://nfl-sentiment-analyzer-jxf4g.ondigitalocean.app/api/health || exit 1

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Deployment Failed',
              body: 'Deployment to DigitalOcean failed. Please check the logs.'
            })
