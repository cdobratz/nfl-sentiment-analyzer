name: ML Service CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'ml/**'
      - '.github/workflows/ml-service.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'ml/**'

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1
  PYTHONPATH: ${{ github.workspace }}/ml

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          cd ml
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run tests
        working-directory: ./ml
        run: |
          pytest tests/ -v --cov=. --cov-report=xml
          
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./ml/coverage.xml
          fail_ci_if_error: false
          
      - name: Check code style
        working-directory: ./ml
        run: |
          black --check .

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
          
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./ml
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nfl-sentiment:latest
            ${{ secrets.DOCKER_USERNAME }}/nfl-sentiment:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/nfl-sentiment:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/nfl-sentiment:buildcache,mode=max
