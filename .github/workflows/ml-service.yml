name: ML Service CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'ml/**'
      - '.github/workflows/ml-service.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'ml/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          cd ml
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run tests
        run: |
          cd ml
          python -m pytest tests/ -v
          
      - name: Check code style
        run: |
          cd ml
          pip install black
          black --check .

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: cdobratz
          password: ${{ secrets.DOCKER_PAT }}
          
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./ml
          push: true
          tags: |
            cdobratz/nfl-sentiment:latest
            cdobratz/nfl-sentiment:${{ github.sha }}
          cache-from: type=registry,ref=cdobratz/nfl-sentiment:buildcache
          cache-to: type=registry,ref=cdobratz/nfl-sentiment:buildcache,mode=max
