name: Deploy to DigitalOcean App Platform

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Build and deploy backend
      - name: Log in to Container registry for backend
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push backend Docker image
        id: push-backend
        uses: docker/build-push-action@v6.5.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}-backend:latest

      # Build and deploy ML service
      - name: Log in to Container registry for ML service
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push ML Docker image
        id: push-ml
        uses: docker/build-push-action@v6.5.0
        with:
          context: ./ml
          file: ./ml/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}-ml:latest

      # Deploy to DigitalOcean App Platform
      - name: Deploy to DigitalOcean
        uses: digitalocean/app_action/deploy@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        env:
          BACKEND_DIGEST: ${{ steps.push-backend.outputs.digest }}
          ML_DIGEST: ${{ steps.push-ml.outputs.digest }}
